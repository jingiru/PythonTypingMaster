<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YK87NQWXFP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-YK87NQWXFP');
  </script>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/webfontworld/d2coding/D2Coding.css" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Typing Master</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div class="update-banner">(26.06.04 업데이트) 캐릭터 미션 기능을 추가하였습니다.</div>

    <div class="survey-link">
      <a href="https://forms.gle/SZjA2YHQxPrDbDwM6" target="_blank">
        서비스 만족도 조사
      </a>
    </div>
    
    <h1>Python Typing Master</h1>
  </header>

  <main>
    
  <!-- 타이핑 연습 영역 -->
    <section class="typing-area">
      <div class="level-buttons">
        <button id="lv0">Lv0(Beginner)</button>
        <button id="lv1">Lv1(Intermediate)</button>
        <button id="lv2">Lv2(Advanced)</button>
        <button id="lv3">Lv3(Expert)</button>
        <button id="lv4">Lv4(Extreme)</button>
      </div>
      <h2>Type the Text Below:</h2>
      <div id="text-to-type"> </div>
      <input type="text" id="typing-input" placeholder="Start typing here...">
      <div class="stats-container">
        <div class="stats">
          <p>Typing speed: <span id="speed">0</span> CPM(Characters Per Minute)</p>
          <p>Accuracy: <span id="accuracy">0</span></p>
        </div>
        <div class="score-line">
          <p>Current: <span id="current-score">0</span> CPM</p>
          <p>Average: <span id="average-score">0</span> CPM</p>
          <p>High: <span id="high-score">0</span> CPM</p>
          <button id="reset-high-score">Reset</button>
          <span id="high-score-message" style="display: none;">New Record!</span>
        </div>



      </div>
    </section>
  </main>
  <aside class="pet-widget" aria-label="Typing pet progress">
    <button class="pet-toggle" id="pet-toggle" type="button" aria-expanded="true" aria-label="알 키우기 화면 접기">
      <span class="pet-toggle-icon" aria-hidden="true"></span>
      <span class="pet-toggle-text">접기</span>
    </button>
    <div class="pet-speech" id="pet-speech">오늘도 손가락 워밍업!</div>
    <div class="pet-panel" id="pet-panel">
      <div class="pet-card">
        <div class="pet-stage" id="pet-stage" aria-hidden="true">
          <span class="egg-deco deco-headband"></span>
          <span class="egg-deco deco-blush"></span>
          <span class="egg-deco deco-hearts"></span>
          <span class="egg-deco deco-crown"></span>
        </div>
        <div class="pet-info">
          <div class="pet-header">
            <span id="pet-name">타자알</span>
            <span id="pet-level">Lv.0</span>
          </div>
          <div class="pet-progress" aria-label="pet experience">
            <div id="pet-progress-fill"></div>
          </div>
          <p id="pet-summary">첫 미션을 기다리는 중</p>
          <p id="pet-requirement">다음 진화 조건을 준비 중</p>
        </div>
      </div>
      <div class="mission-panel">
        <div class="mission-title">다음 진화 미션</div>
        <ul id="mission-list"></ul>
      </div>
    </div>
  </aside>
  <div id="exam-transition" style="display: none; text-align: center;">
    <img src="{{ url_for('static', filename='ptmexam.png') }}" alt="이동 중"
         style="max-width: 500px; margin-top: 20px;">
    <p id="typing-effect" style="font-size: 1.5rem; color: white; margin-top: 15px;"></p>

  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
